<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>🎮 Tic-Tac-Toe Realtime</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center}.container{text-align:center;background:white;padding:40px;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-width:500px;width:100%}h1{color:#333;margin-bottom:30px;font-size:2.5em}#info{font-size:1.2em;margin-bottom:20px;font-weight:bold;color:#667eea}#board{display:grid;grid-template-columns:repeat(3,100px);gap:10px;margin:30px auto;background:#333;padding:10px;border-radius:10px}.cell{width:100px;height:100px;background:white;border:none;border-radius:10px;font-size:2.5em;font-weight:bold;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:all 0.3s ease;color:#667eea}.cell:hover{background:#f0f0f0;transform:scale(1.05)}button{background:#667eea;color:white;border:none;padding:10px 30px;font-size:1em;border-radius:8px;cursor:pointer;transition:background 0.3s ease;margin:10px}button:hover{background:#764ba2}#result{margin-top:20px;font-size:1.5em;font-weight:bold;color:#333;min-height:30px}</style></head><body><div class="container"><h1>🎮 Tic-Tac-Toe</h1><div id="info">Current Player: <span id="current">X</span></div><div id="board"><div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div><div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div><div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div></div><button onclick="resetGame()">Reset Game</button><div id="result"></div></div><script>let board=Array(9).fill(null);let currentPlayer='X';const cells=document.querySelectorAll('.cell');const winPatterns=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];cells.forEach((cell,index)=>{cell.addEventListener('click',()=>{if(board[index]===null){board[index]=currentPlayer;cell.textContent=currentPlayer;if(checkWinner()){document.getElementById('result').textContent='🎉 '+currentPlayer+' Won!';cells.forEach(c=>c.style.pointerEvents='none')}else if(board.every(b=>b!==null)){document.getElementById('result').textContent='🤝 Draw!'}else{currentPlayer=currentPlayer==='X'?'O':'X';document.getElementById('current').textContent=currentPlayer}}})});function checkWinner(){for(let pattern of winPatterns){const[a,b,c]=pattern;if(board[a]&&board[a]===board[b]&&board[a]===board[c]){return true}}return false}function resetGame(){board=Array(9).fill(null);currentPlayer='X';cells.forEach(c=>{c.textContent='';c.style.pointerEvents='auto'});document.getElementById('result').textContent='';document.getElementById('current').textContent='X'}</script></body></html>
